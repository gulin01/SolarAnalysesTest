version: "3.9"

# Override for local development — hot reload, exposed ports, no nginx

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
      - NEXT_PUBLIC_FASTAPI_URL=http://localhost:8000
      - FASTAPI_INTERNAL_URL=http://backend:8000
    command: npm run dev
    networks:
      - solarsight

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - solarsight

  worker:
    volumes:
      - ./backend:/app
    networks:
      - solarsight

  postgres:
    ports:
      - "5432:5432"
    networks:
      - solarsight

  redis:
    ports:
      - "6379:6379"
    networks:
      - solarsight

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - solarsight

networks:
  solarsight:
    driver: bridge
